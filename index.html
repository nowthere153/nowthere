<style>

  .formRow { margin-bottom: 12px; }
  .formRow label { display: block; font-size: 13px; color: #444; margin-bottom: 4px; }
  .formRow input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }

  /* 정보창(모달)은 더 이상 화면 전체를 어둡게 덮지 않고, 지도 위에 뜨는 카드 형태로 표시됩니다.
     카드 바깥은 pointer-events:none이라 지도를 계속 조작(이동/확대/클릭)할 수 있고,
     카드 자체(#modalContent)는 헤더를 드래그해서 원하는 위치로 옮길 수 있습니다. */
  #modal {
    display: none; position: fixed; inset: 0; background: transparent;
    z-index: 100; pointer-events: none;

  #modal.show { display: block; }
  #modalContent {
    position: absolute; top: 96px; left: 50%; transform: translateX(-50%);
    background: white; border-radius: 12px; padding: 14px 16px; max-width: 640px; width: 92%;

  #modalContent.dragging { box-shadow: 0 10px 36px rgba(0,0,0,0.4); transition: none; }
  #modalHeader {
    display: flex; align-items: center; gap: 8px; cursor: move;
    margin: -14px -16px 10px; padding: 10px 12px; border-radius: 12px 12px 0 0;

  #modalDragIcon { color: #aaa; font-size: 14px; line-height: 1; flex: 0 0 auto; }
  #modalContent h3 { flex: 1; font-size: 16px; margin: 0; min-width: 0; overflow-wrap: break-word; }
  #closeBtn {

  #minimizeBtn {

  }
  #modal.peek #modalContent { display: none; }
  #restoreModalBtn {
    display: none; position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    z-index: 101; background: #111827; color: white; border: none; padding: 10px 18px;

  #statusMsg {

    box-shadow: 0 2px 8px rgba(0,0,0,0.15); z-index: 10; display: none;

<!-- ITS 국가교통정보센터 CCTV API (ID 7·34·69) -->
<!-- ⚠️ 중요: 이 키는 지금 브라우저에서 직접 ITS를 호출하는 방식이라 사이트 소스코드에
     그대로 노출됩니다. ITS는 공식 문서(요청변수/출력변수/에러메시지) 확인 결과 IP
     화이트리스트가 없는 것으로 보여 IP 도용 문제는 없지만, 키 자체가 공개되므로 키를
     복사해 남용하면 일일 호출한도가 소진되거나 키가 정지될 수 있습니다. 실서비스
     정식 운영 전에는 ID34의 서버 프록시로 교체해 키를 감추는 것을 권장합니다
     (아래 fetchCctvList 함수 내부만 바꾸면 되고, 호출하는 쪽 코드는 그대로 둬도 됩니다).
     또한 CORS(브라우저 직접 호출 허용 여부)가 아직 실제로 검증되지 않았습니다 -
     차단되어 있다면 이 함수는 항상 실패하고, 그 경우도 프록시로 교체가 필요합니다. -->
<script>
  var ITS_API_KEY = "ee2a7f2c8ccb42c9886f12e30335fca6";

  // ITS 개인키는 하루 호출 한도가 있습니다(실사용 테스트로 "개인 제한량을 초과하였습니다"
  // 에러 확인 - 문의 결과 기본 1,000건/일, 필요시 기관에 증설 요청 가능한 것으로 확인됨).
  // 한도를 아끼기 위해 두 가지를 함께 씁니다.
  //   1) 지도 화면 그대로가 아니라 고정 격자(약 5km 단위)에 맞춰 살짝 넓혀서 조회 -
  //      그래야 서로 다른 사용자가 같은 동네를 조금씩 다른 확대/위치로 봐도 같은 격자를
  //      공유해서 캐시가 재사용됩니다(화면 그대로 캐시하면 사실상 거의 매번 미스가 남).
  //   2) 30분 캐시 - CCTV "목록"(위치·주소)은 자주 안 바뀌는 정보라 이 정도 캐싱은
  //      안전합니다(실시간으로 바뀌는 건 영상 내용이지 목록이 아님).
  var CCTV_GRID_DEG = 0.05; // 약 5km 단위 고정 격자
  var CCTV_CLIENT_CACHE_TTL_MS = 30 * 60 * 1000;
  var cctvClientCache = {};

  function snapBoundsToGrid(bounds) {
    var g = CCTV_GRID_DEG;
    return {
      minX: Math.floor(bounds.minX / g) * g,
      maxX: Math.ceil(bounds.maxX / g) * g,
      minY: Math.floor(bounds.minY / g) * g,
      maxY: Math.ceil(bounds.maxY / g) * g
    };
  }
  function cctvCacheKey(gridBounds) {
    return [gridBounds.minX, gridBounds.maxX, gridBounds.minY, gridBounds.maxY].join(',');
  }

  // 실사용 화면에서 CCTV가 고속도로 순환선 모양으로만 보이고 서울 시내 등 다른 지역엔
  // 하나도 안 보이는 문제가 관찰됨. 원인 후보 두 가지: (1) 문서상 type 파라미터는
  // ex(고속도로)/its(국도) 두 값이 있는데 공식 샘플이 쓰던 'all'이 실제로는 문서화되지
  // 않은 값이라 두 카테고리를 다 합쳐주지 않고 하나만 반환하고 있을 가능성 (2) ITS는
  // 애초에 "고속도로·국도"만 다루는 국가기관이라, 도심 일반도로 CCTV는 ITS 소관이 아니라
  // UTIC(도시교통정보센터) 소관이라 ITS만으로는 원래 도심이 안 보이는 게 정상일 가능성.
  // (1)을 없애기 위해 ex/its 두 값으로 각각 호출해서 합치도록 바꿈 - 한도가 30,000건/일로
  // 늘어나 그리드+캐시 구조에서도 부담이 크지 않음. (2)는 UTIC 연동(ID34)이 되어야 해소됨.
  function fetchOneCctvType(gridBounds, roadType, cb) {
    var url = new URL('https://openapi.its.go.kr:9443/cctvInfo');
    url.searchParams.set('apiKey', ITS_API_KEY);
    url.searchParams.set('type', roadType);  // 'ex'(고속도로) 또는 'its'(국도)
    url.searchParams.set('cctvType', '1');   // 1=실시간 스트리밍(HLS)
    url.searchParams.set('minX', gridBounds.minX);
    url.searchParams.set('maxX', gridBounds.maxX);
    url.searchParams.set('minY', gridBounds.minY);
    url.searchParams.set('maxY', gridBounds.maxY);
    url.searchParams.set('getType', 'json');

    fetch(url.toString()).then(function(res) {
      if (!res.ok) {
        // 응답 원문을 콘솔에 남겨서 "HTTP 401/403 등 숫자"만이 아니라 실제 이유(예: 미승인
        // 키, 활용신청 필요 등 ITS가 보내주는 한글 메시지)까지 확인할 수 있게 함
        return res.text().then(function(bodyText) {
          console.error('[CCTV] ITS(' + roadType + ') 응답 원문(HTTP ' + res.status + '):', bodyText);
          throw new Error('HTTP ' + res.status);
        });
      }
      return res.json();
    }).then(function(data) {
      cb(extractCctvItems(data));
    }).catch(function(err) {
      console.error('[CCTV] ITS(' + roadType + ') 호출 실패:', err);
      cb([]); // 한쪽 타입 호출이 실패해도 다른 쪽 결과는 살리기 위해 빈 배열로 처리
    });
  }

  function dedupeCctvItems(items) {
    var seen = {};
    return items.filter(function(item) {
      var k = item.cctvurl || (item.roadsectionid + ',' + item.coordx + ',' + item.coordy);
      if (seen[k]) return false;
      seen[k] = true;
      return true;
    });
  }

  // bounds: {minX, maxX, minY, maxY} (경도/위도 범위, 보통 mapGetBounds() 결과) /
  // callback({ok, list, error}). 응답을 표준 형태({ok, list})로 감싸서 넘기므로, 나중에
  // 이 함수 내부를 프록시 호출로 바꾸더라도 호출하는 쪽(loadCctvMarkers 등)은 그대로 둬도 됩니다.
  function fetchCctvList(bounds, callback) {
    var gridBounds = snapBoundsToGrid(bounds);
    var key = cctvCacheKey(gridBounds);
    var hit = cctvClientCache[key];
    if (hit && Date.now() - hit.time < CCTV_CLIENT_CACHE_TTL_MS) {
      callback({ ok: true, list: hit.list });
      return;
    }

    var exResult = null, itsResult = null;
    function tryFinish() {
      if (exResult === null || itsResult === null) return; // 둘 다 도착할 때까지 대기
      var list = dedupeCctvItems(exResult.concat(itsResult));
      cctvClientCache[key] = { list: list, time: Date.now() };
      callback({ ok: true, list: list });
    }
    fetchOneCctvType(gridBounds, 'ex', function(list) { exResult = list; tryFinish(); });
    fetchOneCctvType(gridBounds, 'its', function(list) { itsResult = list; tryFinish(); });
  }

  // JSON 응답의 정확한 최상위 구조가 공식 문서에 XML 예시로만 나와 있어(getType=json일 때의
  // 정확한 필드 배치는 미확인), 실제로 나올 수 있는 몇 가지 형태를 방어적으로 모두 시도합니다.
  function extractCctvItems(data) {
    if (!data) return [];
    if (Array.isArray(data)) return data;
    if (data.response && Array.isArray(data.response.data)) return data.response.data;
    if (Array.isArray(data.data)) return data.data;
    return [];
  }
</script>

<script>
  // 1. 지도 초기화 (기본 중심: 서울)
  var mapContainer = document.getElementById('map');
  var mapOption = {
    center: new kakao.maps.LatLng(37.5665, 126.9780),
    level: 7
  };
  var map = new kakao.maps.Map(mapContainer, mapOption);
  var ps = new kakao.maps.services.Places();

  // ================================================================
  // 지도 엔진 어댑터 (ID 50 모듈화)
  // 이 블록 아래의 나머지 코드는 kakao.maps.* 를 직접 호출하지 않고
  // 아래 map으로 시작하는 함수들만 사용합니다. 나중에 다른 지도 엔진(예: 글로벌 SDK)으로
  // 바꿀 때는 이 블록 안쪽 구현만 새로 갈아끼우면 되고, 이 블록을 호출하는 코드는
  // 손댈 필요가 없습니다.
  // ================================================================
  function mapLatLng(lat, lng) { return new kakao.maps.LatLng(lat, lng); }

  function mapSetCenter(lat, lng) { map.setCenter(mapLatLng(lat, lng)); }
  function mapGetLevel() { return map.getLevel(); }
  function mapSetLevel(level) { map.setLevel(level); }
  function mapZoomIn() { map.setLevel(map.getLevel() - 1); }
  function mapZoomOut() { map.setLevel(map.getLevel() + 1); }

  function mapIsSkyView() { return map.getMapTypeId() === kakao.maps.MapTypeId.SKYVIEW; }
  function mapSetSkyView(on) {
    map.setMapTypeId(on ? kakao.maps.MapTypeId.SKYVIEW : kakao.maps.MapTypeId.ROADMAP);
  }

  // 현재 지도 화면에 보이는 범위를 {minX,maxX,minY,maxY}(경도/위도)로 반환 - ITS/UTIC 같은
  // bbox 기반 조회 API에 그대로 넘길 수 있는 형태 (ID 69)
  function mapGetBounds() {
    var b = map.getBounds();
    var sw = b.getSouthWest(), ne = b.getNorthEast();
    return { minX: sw.getLng(), maxX: ne.getLng(), minY: sw.getLat(), maxY: ne.getLat() };
  }

  // 핀 SVG 아이콘 생성 (color 파라미터로 빨강/파랑 구분) - 어댑터 내부에서만 사용
  function pinImage(hexColor) {
    var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">' +
      '<path d="M14 0C6.3 0 0 6.3 0 14c0 10.5 14 22 14 22s14-11.5 14-22C28 6.3 21.7 0 14 0z" fill="' + hexColor + '"/>' +
      '<circle cx="14" cy="14" r="6" fill="white"/></svg>';
    return new kakao.maps.MarkerImage('data:image/svg+xml;base64,' + btoa(svg), new kakao.maps.Size(28, 36));
  }

  // CCTV 전용 아이콘: 빨강/파랑과 같은 물방울(핀) 모양 대신, 흰 원형 배지 안에 우산+눈송이를
  // 벡터로 직접 그려서 "교통"보다 "이 장소 날씨 확인"이라는 서비스 본질을 표현 (ID 69 후속
  // 수정 - 처음엔 이모지(☔)를 핀 안에 넣었는데 렌더링이 안정적이지 않고 핀 모양 자체가
  // 다른 마커와 너무 비슷해 보인다는 피드백으로, 이모지 대신 순수 SVG 도형으로 다시 그리고
  // 모양도 물방울 핀이 아닌 원형 배지로 바꿈)
  function weatherIconImage() {
    var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 30 30">' +
      '<circle cx="15" cy="15" r="14" fill="white" stroke="#7c3aed" stroke-width="1.5"/>' +
      // 우산 캐노피(돔) + 물결모양 아랫단
      '<path d="M6 16 A9 9 0 0 1 24 16 Z" fill="#7c3aed"/>' +
      '<path d="M6 16 Q7.5 14 9 16 Q10.5 14 12 16 Q13.5 14 15 16 Q16.5 14 18 16 Q19.5 14 21 16 Q22.5 14 24 16 L24 17 L6 17 Z" fill="white"/>' +
      // 손잡이
      '<line x1="15" y1="16" x2="15" y2="23" stroke="#7c3aed" stroke-width="1.6" stroke-linecap="round"/>' +
      '<path d="M15 23 q0 3 -3 3" fill="none" stroke="#7c3aed" stroke-width="1.6" stroke-linecap="round"/>' +
      // 눈송이 (우산 위, 계절 무관하게 "날씨"라는 의미를 보태기 위한 보조 표시)
      '<g stroke="#38bdf8" stroke-width="1.3" stroke-linecap="round">' +
      '<line x1="15" y1="3" x2="15" y2="8"/>' +
      '<line x1="12.5" y1="4.3" x2="17.5" y2="6.7"/>' +
      '<line x1="17.5" y1="4.3" x2="12.5" y2="6.7"/>' +
      '</g></svg>';
    // encodeURIComponent 사용 이유: 위 SVG에 특수문자는 없지만, 앞으로 이모지 등 유니코드가
    // 추가돼도 깨지지 않도록(btoa는 유니코드를 못 다룸) 안전한 인코딩 방식을 씀
    return new kakao.maps.MarkerImage('data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg), new kakao.maps.Size(30, 30));
  }

  // opts.color: 'red'(유튜브 라이브=지금 이 순간) | 'blue'(인스타그램=그때 그 순간) |
  //   'purple'(ITS/UTIC CCTV=기관 제공 실시간 영상, ID 69 - 우산+눈송이 원형 배지 아이콘 사용)
  //   | 생략(기본 회색 마커)
  // opts.onClick: 마커 클릭시 실행할 함수(선택)
  function mapCreateMarker(lat, lng, opts) {
    opts = opts || {};
    var markerOpts = { position: mapLatLng(lat, lng), map: map };
    if (opts.color === 'red') markerOpts.image = pinImage('#e11d48');
    if (opts.color === 'blue') markerOpts.image = pinImage('#2563eb');
    if (opts.color === 'purple') markerOpts.image = weatherIconImage();
    var marker = new kakao.maps.Marker(markerOpts);
    if (opts.onClick) kakao.maps.event.addListener(marker, 'click', opts.onClick);
    return marker;
  }
  function mapRemoveMarker(marker) { if (marker) marker.setMap(null); }
  // 마커를 지우지 않고 보이기/숨기기만 전환 (필터링 등에 사용)
  function mapSetMarkerVisible(marker, visible) { if (marker) marker.setMap(visible ? map : null); }

  // 현재 위치 표시 전용 파란 점 마커 (일반 스팟 핀과 다른 스타일)
  function mapCreateLocationMarker(lat, lng) {
    var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22"><circle cx="11" cy="11" r="8" fill="#3b82f6" stroke="white" stroke-width="3"/></svg>';
    return new kakao.maps.Marker({
      position: mapLatLng(lat, lng), map: map,
      image: new kakao.maps.MarkerImage('data:image/svg+xml;base64,' + btoa(svg), new kakao.maps.Size(22, 22))
    });
  }

  // pathArr: [{lat,lng}, ...] 형태의 평범한 배열
  function mapDrawPolyline(pathArr) {
    var path = pathArr.map(function(p) { return mapLatLng(p.lat, p.lng); });
    var line = new kakao.maps.Polyline({
      path: path, strokeWeight: 3, strokeColor: '#4338ca', strokeOpacity: 0.85, strokeStyle: 'shortdash'
    });
    line.setMap(map);
    return line;
  }
  function mapRemovePolyline(line) { if (line) line.setMap(null); }

  // pointsArr: [{lat,lng}, ...] 배열을 모두 포함하도록 지도 범위를 자동 조정
  function mapFitBounds(pointsArr) {
    var bounds = new kakao.maps.LatLngBounds();
    pointsArr.forEach(function(p) { bounds.extend(mapLatLng(p.lat, p.lng)); });
    map.setBounds(bounds);
  }

  // 지도 클릭 이벤트 - 콜백에는 카카오 전용 객체 대신 {lat, lng} 평범한 값만 전달
  function mapOnClick(handler) {
    kakao.maps.event.addListener(map, 'click', function(mouseEvent) {
      handler({ lat: mouseEvent.latLng.getLat(), lng: mouseEvent.latLng.getLng() });
    });
  }

  // 지도 이동/확대·축소가 끝나고 멈췄을 때 호출 (드래그 중이 아니라 "정지한 시점"에 한 번만
  // 호출됨) - CCTV처럼 "지금 보이는 범위"를 기준으로 다시 불러와야 하는 기능에 사용 (ID 69)
  function mapOnIdle(handler) {
    kakao.maps.event.addListener(map, 'idle', handler);
  }

  // 키워드로 장소 검색 - 카카오 응답 형식을 그대로 넘기지 않고 단순화된 형태로 콜백에 전달
  function mapSearchPlace(keyword, callback) {
    ps.keywordSearch(keyword, function(data, status) {
      if (status === kakao.maps.services.Status.OK) {
        var results = data.map(function(place) {
          return { lat: parseFloat(place.y), lng: parseFloat(place.x), name: place.place_name, address: place.address_name };
        });
        callback({ ok: true, results: results });
      } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
        callback({ ok: false, zeroResult: true });
      } else {
        callback({ ok: false, zeroResult: false });
      }
    });
  }
  // ================================================================
  // 어댑터 끝 - 이 아래부터는 kakao.maps.*를 직접 쓰지 않습니다
  // ================================================================

  // 카카오 기본 확대/축소 컨트롤·지도타입 컨트롤은 화면 크기에 따라 위치가 예측 불가능하게
  // 바뀌거나(모바일에서 아예 안 보이는 경우 포함) 상단 UI와 겹치는 문제가 있어, 둘 다 빼고
  // 직접 만든 버튼으로 대체해 위치와 노출을 완전히 통제한다
  document.getElementById('zoomInBtn').addEventListener('click', function() {
    mapZoomIn();
  });
  document.getElementById('zoomOutBtn').addEventListener('click', function() {
    mapZoomOut();
  });
  document.getElementById('mapTypeBtn').addEventListener('click', function() {
    var isSky = mapIsSkyView();
    mapSetSkyView(!isSky);
    document.getElementById('mapTypeBtn').textContent = isSky ? '🛰️ 스카이뷰' : '🗺️ 일반지도';
  });

  var markers = [];

  // 소유자 식별 (로그인 없이, 이 브라우저에서 등록한 것만 "내 것"으로 인식)
  function getMyOwnerId() {
    var key = 'gogibiwa_owner_id';
    var id = localStorage.getItem(key);
    if (!id) {
      id = 'u_' + Date.now() + '_' + Math.random().toString(36).slice(2, 10);
      localStorage.setItem(key, id);
    }
    return id;
  }
  var myOwnerId = getMyOwnerId();

  // 관리자 모드 (신고 처리 등 목적, 브랜드 로고 5회 클릭으로 진입 - 임시 방식)
  var isAdmin = false;
  var logoClickCount = 0;
  document.querySelector('#header .brand').addEventListener('click', function() {
    logoClickCount++;
    if (logoClickCount >= 5) {
      logoClickCount = 0;
      var pw = prompt('관리자 비밀번호를 입력하세요');
      if (pw === 'gogibiwa2026') {
        isAdmin = true;
        showStatus('🔑 관리자 모드로 전환되었습니다.');
        if (lastSnapshot) renderSharedSpots(lastSnapshot); // 신고 누적으로 숨겨졌던 스팟도 즉시 표시
        updateCctvButtonVisibility(); // 관리자는 공개설정과 무관하게 CCTV 버튼을 미리 볼 수 있음 (ID 69)
      }
    }
  });

  function clearMarkers() {
    markers.forEach(mapRemoveMarker);
    markers = [];
  }

  function showStatus(msg) {
    var el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(function(){ el.style.display = 'none'; }, 3000);
  }

  // 2. 샘플 스팟 (고정 데모용 - Firestore에 저장되지 않음, 관리자만 삭제 가능)
  var sampleSpots = [
    { name: '서울시청 인근 (샘플)', lat: 37.5665, lng: 126.9780, type: 'youtube', videoId: 'jNQXAC9IVRw', category: 'nature' },
    { name: '해운대해수욕장 인근 (샘플)', lat: 35.1587, lng: 129.1604, type: 'youtube', videoId: 'jNQXAC9IVRw', category: 'nature' },
    { name: '설악산 입구 인근 (샘플)', lat: 38.1194, lng: 128.4657, type: 'youtube', videoId: 'jNQXAC9IVRw', category: 'nature' },
    { name: '남이섬 인근 (샘플)', lat: 37.7906, lng: 127.5262, type: 'youtube', videoId: 'jNQXAC9IVRw', category: 'nature' },
    { name: '경포호 인근 (샘플)', lat: 37.7955, lng: 128.9075, type: 'youtube', videoId: 'jNQXAC9IVRw', category: 'nature' }
  ];

  var sharedSpots = [];      // Firestore에서 실시간으로 채워지는, 모두에게 공유되는 실제 등록 데이터
  var liveSpots = sampleSpots; // 거리 매칭에 쓰이는 통합 리스트 (Firestore 로드되면 자동 갱신됨)

  var DISTANCE_THRESHOLD_KM = 15; // 이 거리(km) 넘으면 "참고용" 경고 표시

  // 하버사인 공식으로 두 좌표간 거리(km) 계산
  function getDistanceKm(lat1, lng1, lat2, lng2) {
    var R = 6371;
    var dLat = (lat2 - lat1) * Math.PI / 180;
    var dLng = (lng2 - lng1) * Math.PI / 180;
    var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
            Math.sin(dLng/2) * Math.sin(dLng/2);
    var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
  }

  // 주어진 좌표에서 가장 가까운 라이브 스팟 찾기
  function findNearestSpot(lat, lng) {
    var nearest = null, minDist = Infinity;
    liveSpots.forEach(function(spot) {
      var d = getDistanceKm(lat, lng, spot.lat, spot.lng);
      if (d < minDist) { minDist = d; nearest = spot; }
    });
    return { spot: nearest, distance: minDist };
  }

  // (핀 아이콘 생성은 지도 어댑터의 mapCreateMarker 안으로 이동 - ID 50)

  var CATEGORY_OPTIONS = [
    { key: 'nature', label: '풍경', emoji: '🌿' },
    { key: 'view',   label: '조망', emoji: '🏙️' },
    { key: 'scene',  label: '현장', emoji: '🚨' },
    { key: 'shop',   label: '우리가게', emoji: '🏪' }
  ];
  function categoryLabel(key) {
    var found = CATEGORY_OPTIONS.filter(function(c){ return c.key === key; })[0];
    return found ? (found.emoji + ' ' + found.label) : '';
  }

  // 등록 폼의 "묶음 이름" 입력란은 카테고리마다 의미가 달라서 문구를 다르게 보여줌
  // (풍경=여러 장소를 잇는 여행 여정 / 조망=같은 건물·매물의 여러 뷰 / 우리가게=같은 가게의 여러 등록)
  // 저장되는 데이터 필드(journey)와 묶어보기 로직은 카테고리에 상관없이 동일합니다.
  var JOURNEY_FIELD_CONFIG = {
    nature: { label: '여정 이름', hint: '(선택 — 여러 장소를 하나의 여행 여정으로 묶고 싶을 때)', placeholder: '예: 26년7월 지리산여행' },
    view:   { label: '묶음 이름', hint: '(선택 — 같은 건물·매물의 다른 각도 뷰를 하나로 묶고 싶을 때)', placeholder: '예: 해운대 OO아파트 108동' },
    shop:   { label: '가게 이름', hint: '(선택 — 같은 가게에서 등록한 여러 콘텐츠를 하나로 묶고 싶을 때)', placeholder: '예: OO카페 홍대점' }
  };
  var JOURNEY_FIELD_DEFAULT = { label: '기록 이름', hint: '(선택 — 여러 곳을 하나로 묶고 싶을 때)', placeholder: '예: 26년7월 지리산여행' };

  // 카테고리 필터: null이면 전체 표시
  var activeFilter = null;
  function passesFilter(spot) {
    if (!activeFilter) return true;
    return spot.category === activeFilter;
  }
  function applyFilter() {
    sampleSpots.concat(sharedSpots).forEach(function(spot) {
      if (!spot.marker) return;
      mapSetMarkerVisible(spot.marker, passesFilter(spot));
    });
  }
  // 카테고리별 등록 건수 배지 (ID 66) - 일반 사용자에게는 전체·카테고리 구분 없이 어떤 숫자도
  // 노출하지 않고, 관리자 모드에서만 운영 확인용으로 정확한 건수를 보여줌
  function countByCategory(key) {
    var all = sampleSpots.concat(sharedSpots);
    if (!key) return all.length;
    return all.filter(function(s) { return s.category === key; }).length;
  }
  function chipCountBadge(count) {
    if (!isAdmin) return '';
    return '<span class="chipCount">' + count + '</span>';
  }
  function renderFilterBar() {
    var chips = '<button class="filterChip' + (activeFilter === null ? ' active' : '') + '" data-key="">전체' + chipCountBadge(countByCategory(null)) + '</button>' +
      CATEGORY_OPTIONS.map(function(c) {
        return '<button class="filterChip' + (activeFilter === c.key ? ' active' : '') + '" data-key="' + c.key + '">' + c.emoji + ' ' + c.label + chipCountBadge(countByCategory(c.key)) + '</button>';
      }).join('');
    document.getElementById('filterBar').innerHTML = chips;
    document.querySelectorAll('.filterChip[data-key]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        activeFilter = btn.getAttribute('data-key') || null;
        renderFilterBar();
        applyFilter();
      });
    });
  }

  // 콘텐츠 타입에 맞는 임베드 HTML 생성 (유튜브 iframe / 인스타그램 공식 블록쿼트)
  function buildEmbedHtml(spot) {
    if (spot.type === 'instagram') {
      return '<blockquote class="instagram-media" data-instgrm-permalink="' + spot.permalink +
        '" data-instgrm-version="14" style="margin:0;width:100%;min-width:280px;"></blockquote>';
    }
    return '<iframe width="100%" height="315" src="https://www.youtube.com/embed/' + spot.videoId +
      '" frameborder="0" allowfullscreen></iframe>';
  }

  // 등록시각을 "3분 전 / 2시간 전 / 1일 전"처럼 상대적으로 표시 (현장 제보의 신선도 강조용)
  function timeAgoLabel(ms) {
    if (!ms) return '';
    var diff = Date.now() - ms;
    if (diff < 0) diff = 0;
    var min = Math.floor(diff / 60000);
    if (min < 1) return '방금 전';
    if (min < 60) return min + '분 전';
    var hr = Math.floor(min / 60);
    if (hr < 24) return hr + '시간 전';
    var day = Math.floor(hr / 24);
    return day + '일 전';
  }

  // 핀별 고유 공유 링크 생성 (예: index.html?spot=abc123) — 매물 페이지 등에 붙여넣으면
  // 접속 즉시 지도가 해당 스팟으로 이동하고 정보창이 자동으로 열립니다.
  function getSpotShareUrl(spot) {
    var base = location.origin + location.pathname;
    return base + '?spot=' + encodeURIComponent(spot.id);
  }

  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try {
      document.execCommand('copy');
      showStatus('🔗 공유 링크가 복사되었습니다.');
    } catch (e) {
      showStatus('복사에 실패했습니다. 주소창에서 직접 복사해주세요: ' + text);
    }
    document.body.removeChild(ta);
  }

  function copyToClipboard(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        showStatus('🔗 공유 링크가 복사되었습니다. 매물 페이지 등에 붙여넣어보세요.');
      }).catch(function() {
        fallbackCopy(text);
      });
    } else {
      fallbackCopy(text);
    }
  }

  // 스팟 클릭시 모달 열기 (타입에 따라 인스타그램이면 임베드 스크립트 재실행) + 권한별 삭제/신고 버튼
  function openSpotModal(spot) {
    var canDelete = isAdmin || (spot.ownerId && spot.ownerId === myOwnerId);
    var canReport = !!spot.id; // Firestore에 저장된 공유 스팟만 신고 가능 (샘플 데이터 제외)
    var body = '';
    if (spot.category === 'scene') {
      var agoLabel = spot.createdAt ? timeAgoLabel(spot.createdAt) : '';
      body += '<span style="display:inline-block;margin-bottom:8px;margin-right:6px;padding:4px 10px;border-radius:12px;background:#fff1f2;color:#c2410c;font-size:12px;font-weight:700;">🚨 현장 제보' + (agoLabel ? ' · ' + agoLabel + ' 등록' : '') + '</span>';
    } else if (spot.category) {
      body += '<span style="display:inline-block;margin-bottom:8px;margin-right:6px;padding:4px 10px;border-radius:12px;background:#f2f2f2;font-size:12px;">' + categoryLabel(spot.category) + '</span>';
    }
    if (spot.journey) {
      body += '<span style="display:inline-block;margin-bottom:8px;padding:4px 10px;border-radius:12px;background:#eef2ff;color:#4338ca;font-size:12px;">🧭 ' + spot.journey + '</span>';
    }
    if (spot.category === 'view' && spot.id) {
      body += '<p style="margin-bottom:8px;padding:8px 10px;border-radius:8px;background:#f0f9ff;color:#075985;font-size:12.5px;">🏙️ 조망 인증 링크 — 아래 "공유 링크 복사"를 눌러 매물 페이지 등에 붙여넣으면 이 뷰를 그대로 보여줄 수 있어요.</p>';
    }
    body += buildEmbedHtml(spot);
    if (spot.journey) {
      body += '<button id="viewJourneyBtn" style="margin-top:10px;padding:8px 14px;border-radius:8px;border:1px solid #ddd;background:white;color:#4338ca;cursor:pointer;font-size:13px;">🧭 이 여정 전체보기</button>';
    }

    if (isAdmin && spot.reportCount) {
      body += '<p style="margin-top:10px;font-size:12px;color:#c2410c;">🚩 신고 ' + spot.reportCount + '건 누적 (관리자만 표시)</p>';
    }

    var btnRow = '<div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">';
    if (spot.id) {
      btnRow += '<button id="shareSpotBtn" style="padding:8px 14px;border-radius:8px;border:1px solid #ddd;background:white;color:#2563eb;cursor:pointer;font-size:13px;">🔗 공유 링크 복사</button>';
    }
    if (canDelete) {
      btnRow += '<button id="deleteSpotBtn" style="padding:8px 14px;border-radius:8px;border:1px solid #ddd;background:white;color:#888;cursor:pointer;font-size:13px;">🗑 이 스팟 삭제' + (isAdmin && spot.ownerId !== myOwnerId ? ' (관리자)' : '') + '</button>';
    }
    if (canReport) {
      btnRow += '<button id="reportSpotBtn" style="padding:8px 14px;border-radius:8px;border:1px solid #ddd;background:white;color:#c2410c;cursor:pointer;font-size:13px;">🚩 신고</button>';
    }
    btnRow += '</div><div id="reportReasons" style="display:none;margin-top:8px;font-size:13px;"></div>';
    body += btnRow;

    openModal(spot.name, body);
    if (spot.type === 'instagram' && window.instgrm) {
      window.instgrm.Embeds.process();
    }
    if (spot.journey) {
      document.getElementById('viewJourneyBtn').addEventListener('click', function() {
        var groups = getAllJourneyGroups(liveSpots);
        var key = (spot.ownerId || 'unknown') + '|' + normalizeJourney(spot.journey);
        var g = groups[key];
        if (g) openJourneyModal(g.name, g.spots);
      });
    }

    if (spot.id) {
      document.getElementById('shareSpotBtn').addEventListener('click', function() {
        copyToClipboard(getSpotShareUrl(spot));
      });
    }

    if (canDelete) {
      document.getElementById('deleteSpotBtn').addEventListener('click', function() {
        if (!confirm('"' + spot.name + '"을(를) 삭제하시겠습니까?')) return;
        if (spot.id) {
          // Firestore에 저장된 공유 데이터 → 서버에서 삭제 (모두에게 반영됨)
          db.collection('spots').doc(spot.id).delete().catch(function(err) {
            showStatus('삭제 실패: ' + err.message);
          });
        } else {
          // 샘플(고정 데모) 데이터 → 로컬에서만 제거
          mapRemoveMarker(spot.marker);
          var idx = sampleSpots.indexOf(spot);
          if (idx > -1) sampleSpots.splice(idx, 1);
        }
        document.getElementById('modal').classList.remove('show');
        document.getElementById('modalBody').innerHTML = '';
        showStatus('🗑 삭제되었습니다.');
      });
    }

    if (canReport) {
      document.getElementById('reportSpotBtn').addEventListener('click', function() {
        var box = document.getElementById('reportReasons');
        box.style.display = 'block';
        box.innerHTML =
          '<p style="color:#666;margin-bottom:6px;">신고 사유를 선택해주세요</p>' +
          '<div style="display:flex;gap:6px;flex-wrap:wrap;">' +
          ['얼굴노출', '풍경아님', '위치오류', '무관영상', '기타'].map(function(reason) {
            return '<button class="reportReasonBtn" data-reason="' + reason + '" style="padding:6px 10px;border-radius:6px;border:1px solid #ddd;background:#f9f9f9;cursor:pointer;font-size:12px;">' + reason + '</button>';
          }).join('') + '</div>';

        box.querySelectorAll('.reportReasonBtn').forEach(function(btn) {
          btn.addEventListener('click', function() {
            submitReport(spot, btn.getAttribute('data-reason'));
          });
        });
      });
    }
  }

  // 신고 접수 (같은 브라우저 중복신고 방지, 3건 누적시 자동 숨김 - 관리자 제외)
  function submitReport(spot, reason) {
    var reportedKey = 'gogibiwa_reported_ids';
    var reported = JSON.parse(localStorage.getItem(reportedKey) || '[]');
    if (reported.indexOf(spot.id) > -1) {
      showStatus('이미 신고하신 스팟입니다.');
      return;
    }
    db.collection('spots').doc(spot.id).update({
      reportCount: firebase.firestore.FieldValue.increment(1)
    }).then(function() {
      reported.push(spot.id);
      localStorage.setItem(reportedKey, JSON.stringify(reported));
      document.getElementById('modal').classList.remove('show');
      document.getElementById('modalBody').innerHTML = '';
      showStatus('🚩 신고(' + reason + ')가 접수되었습니다. 검토 후 조치됩니다.');
    }).catch(function(err) {
      showStatus('신고 처리 실패: ' + err.message);
    });
  }

  // 샘플 스팟들을 지도에 핀으로 항상 표시 (타입별 색상 구분)
  function addLiveSpotPins() {
    sampleSpots.forEach(function(spot) {
      var marker = mapCreateMarker(spot.lat, spot.lng, {
        color: spot.type === 'instagram' ? 'blue' : 'red',
        onClick: function() { openSpotModal(spot); }
      });
      spot.marker = marker;
      markers.push(marker);
    });
  }
  addLiveSpotPins();
  renderFilterBar();
  applyFilter();

  // Firestore 실시간 구독: 누군가 등록/삭제/신고하면 모든 접속자의 화면에 즉시 반영됨
  var sharedMarkers = [];
  var REPORT_HIDE_THRESHOLD = 3; // 이 값 이상 신고 누적시 일반 사용자에게는 숨김 (관리자는 계속 보임)
  var lastSnapshot = null;

  // 공유 링크(?spot=아이디)로 접속한 경우, 데이터 로드 후 해당 스팟으로 자동 이동 + 정보창 오픈
  function getUrlSpotId() {
    try {
      return new URLSearchParams(location.search).get('spot');
    } catch (e) {
      return null;
    }
  }
  var pendingShareId = getUrlSpotId();
  var pendingShareResolved = !pendingShareId;

  function resolvePendingShareSpot() {
    if (pendingShareResolved) return;
    var target = sharedSpots.filter(function(s) { return s.id === pendingShareId; })[0];
    pendingShareResolved = true;
    if (target) {
      mapSetCenter(target.lat, target.lng);
      mapSetLevel(3);
      openSpotModal(target);
      showStatus('🔗 공유된 스팟을 불러왔습니다: ' + target.name);
    } else {
      showStatus('⚠️ 공유된 스팟을 찾을 수 없습니다. (삭제되었거나 비공개 처리되었을 수 있습니다)');
    }
    // 주소창을 깔끔하게 정리 (뒤로가기/새로고침 시 재오픈 방지)
    if (window.history && window.history.replaceState) {
      window.history.replaceState(null, '', location.pathname);
    }
  }

  function renderSharedSpots(querySnapshot) {
    sharedMarkers.forEach(mapRemoveMarker);
    sharedMarkers = [];
    sharedSpots = [];

    querySnapshot.forEach(function(docSnap) {
      var d = docSnap.data();
      var hiddenByReports = (d.reportCount || 0) >= REPORT_HIDE_THRESHOLD && !isAdmin;
      if (hiddenByReports) return; // 신고 누적 스팟은 일반 사용자 화면에서 제외 (데이터는 삭제되지 않음)

      var spot = {
        id: docSnap.id, name: d.name, lat: d.lat, lng: d.lng,
        type: d.type, videoId: d.videoId, permalink: d.permalink, ownerId: d.ownerId,
        reportCount: d.reportCount || 0, category: d.category || null,
        journey: d.journey || null,
        createdAt: (d.createdAt && d.createdAt.toMillis) ? d.createdAt.toMillis() : 0
      };
      var marker = mapCreateMarker(spot.lat, spot.lng, {
        color: spot.type === 'instagram' ? 'blue' : 'red',
        onClick: function() { openSpotModal(spot); }
      });
      spot.marker = marker;
      sharedMarkers.push(marker);
      sharedSpots.push(spot);
    });

    liveSpots = sampleSpots.concat(sharedSpots); // 거리 매칭 대상 갱신
    applyFilter(); // 새로 들어온 공유 스팟에도 현재 필터 상태 적용
    renderFilterBar(); // 카테고리별 등록 건수 배지 갱신 (ID 66)
    resolvePendingShareSpot(); // 공유 링크로 접속했다면 첫 데이터 로드 시 자동으로 열기
  }

  db.collection('spots').onSnapshot(function(querySnapshot) {
    lastSnapshot = querySnapshot;
    renderSharedSpots(querySnapshot);
  }, function(err) {
    showStatus('⚠️ 데이터 연결 오류: ' + err.message);
  });

  // 3. 검색 기능
  // 기록 이름 비교용 정규화: 공백/특수문자 무시, 대소문자 무시 (예: "26년 지리산 여행" == "26년지리산여행")
  function normalizeJourney(s) {
    return (s || '').toLowerCase().replace(/[\s\-_.,·]+/g, '');
  }

  // 여정을 "등록자 + 기록이름" 조합으로 그룹핑 (동명이인 여정이 서로 섞이지 않도록)
  function getAllJourneyGroups(list) {
    var groups = {};
    list.forEach(function(s) {
      if (!s.journey) return;
      var key = (s.ownerId || 'unknown') + '|' + normalizeJourney(s.journey);
      if (!groups[key]) groups[key] = { name: s.journey, ownerId: s.ownerId, spots: [] };
      groups[key].spots.push(s);
    });
    Object.keys(groups).forEach(function(k) {
      groups[k].spots.sort(function(a, b) { return (a.createdAt || 0) - (b.createdAt || 0); });
    });
    return groups;
  }

  // 검색어와 일치하는 여정 그룹들을 최근 활동순으로 반환 (여러 사람의 동명 여정도 각각 구분됨)
  function findJourneyGroupsByKeyword(keyword) {
    var normKeyword = normalizeJourney(keyword);
    if (!normKeyword) return [];
    var groups = getAllJourneyGroups(liveSpots);
    return Object.keys(groups).map(function(k) { return groups[k]; })
      .filter(function(g) { return normalizeJourney(g.name).indexOf(normKeyword) > -1; })
      .sort(function(a, b) {
        var aLatest = Math.max.apply(null, a.spots.map(function(s) { return s.createdAt || 0; }).concat([0]));
        var bLatest = Math.max.apply(null, b.spots.map(function(s) { return s.createdAt || 0; }).concat([0]));
        return bLatest - aLatest; // 최근 활동순
      });
  }

  // 내가(이 브라우저가) 만든 여정 그룹 목록
  function getMyJourneyGroups() {
    var groups = getAllJourneyGroups(sharedSpots);
    return Object.keys(groups).map(function(k) { return groups[k]; })
      .filter(function(g) { return g.ownerId === myOwnerId; });
  }

  var journeyPolyline = null;
  function clearJourneyPolyline() {
    mapRemovePolyline(journeyPolyline);
    journeyPolyline = null;
  }
  function drawJourneyPath(list) {
    clearJourneyPolyline();
    if (list.length < 2) return;
    journeyPolyline = mapDrawPolyline(list.map(function(s) { return { lat: s.lat, lng: s.lng }; }));
  }

  // 등록시각 기준 상대적 일자 라벨 (예: "1일차 · 7/15") - 국내 근거리든 해외 원거리든 동일 로직
  function dayLabel(list, s) {
    var times = list.map(function(x) { return x.createdAt; }).filter(Boolean);
    if (!s.createdAt || !times.length) return '';
    var minTime = Math.min.apply(null, times);
    var diffDays = Math.floor((s.createdAt - minTime) / 86400000);
    var d = new Date(s.createdAt);
    return (diffDays + 1) + '일차 · ' + (d.getMonth() + 1) + '/' + d.getDate() + ' ';
  }

  function openJourneyPickerModal(keyword, groups) {
    var body = '<p style="color:#666;margin-bottom:10px;">"' + keyword + '"이(가) 포함된 기록이 ' + groups.length + '건 있습니다. 하나를 선택해주세요.</p>' +
      '<div style="display:flex;flex-direction:column;gap:8px;">' +
      groups.map(function(g, idx) {
        var mine = g.ownerId === myOwnerId ? ' <span style="color:#4338ca;">· 내 기록</span>' : '';
        return '<button class="journeyPickBtn" data-idx="' + idx + '" style="text-align:left;padding:10px 12px;border-radius:8px;border:1px solid #eee;background:#f9f9f9;cursor:pointer;font-size:14px;">🧭 ' + g.name + ' <span style="color:#999;font-size:12px;">(' + g.spots.length + '곳)</span>' + mine + '</button>';
      }).join('') + '</div>';
    openModal('🔎 "' + keyword + '" 검색 결과', body);
    document.querySelectorAll('.journeyPickBtn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var g = groups[parseInt(btn.getAttribute('data-idx'), 10)];
        openJourneyModal(g.name, g.spots);
      });
    });
  }

  function openJourneyModal(journeyName, spotsList) {
    if (spotsList.length > 0) {
      mapFitBounds(spotsList.map(function(s) { return { lat: s.lat, lng: s.lng }; }));
    }
    drawJourneyPath(spotsList);

    var body = '<p style="color:#666;margin-bottom:10px;">등록 순서대로 ' + spotsList.length + '곳의 기록입니다.</p><div style="display:flex;flex-direction:column;gap:8px;">' +
      spotsList.map(function(s, idx) {
        var label = dayLabel(spotsList, s);
        return '<button class="journeySpotBtn" data-idx="' + idx + '" style="text-align:left;padding:10px 12px;border-radius:8px;border:1px solid #eee;background:#f9f9f9;cursor:pointer;font-size:14px;">' +
          (idx + 1) + '. ' + s.name + (s.category ? ' · ' + categoryLabel(s.category) : '') +
          (label ? '<br><span style="font-size:11px;color:#999;">' + label + '</span>' : '') + '</button>';
      }).join('') + '</div>';
    openModal('🧭 ' + journeyName, body);
    document.querySelectorAll('.journeySpotBtn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        openSpotModal(spotsList[parseInt(btn.getAttribute('data-idx'), 10)]);
      });
    });
  }

  function searchPlace() {
    var keyword = document.getElementById('searchInput').value.trim();
    if (!keyword) return;

    // 0. 여행기록(여정) 이름과 먼저 매칭 - 실제 저장된 기록 이름 기준, 여러 사람의 동명 여정은 구분됨
    var journeyGroups = findJourneyGroupsByKeyword(keyword);
    if (journeyGroups.length === 1) {
      clearMarkers();
      var g = journeyGroups[0];
      openJourneyModal(g.name, g.spots);
      showStatus('"' + g.name + '" 여정 ' + g.spots.length + '곳을 지도에 표시했습니다');
      return;
    } else if (journeyGroups.length > 1) {
      clearMarkers();
      openJourneyPickerModal(keyword, journeyGroups);
      return;
    }

    // 먼저 등록된 스팟 이름 자체와 일치하는지 확인 (예: "강강유" 검색시 바로 그 스팟으로 이동)
    var nameMatch = liveSpots.find(function(s) {
      return s.name.toLowerCase().indexOf(keyword.toLowerCase()) > -1;
    });
    if (nameMatch) {
      clearMarkers();
      mapSetCenter(nameMatch.lat, nameMatch.lng);
      mapSetLevel(4);
      openSpotModal(nameMatch);
      showStatus('"' + keyword + '" 등록된 스팟을 찾았습니다!');
      return;
    }

    mapSearchPlace(keyword, function(res) {
      if (res.ok) {
        clearMarkers();
        var data = res.results;

        // 검색된 장소들 중 첫 번째(가장 관련성 높은 결과) 기준으로 최근접 라이브 스팟을 매칭
        var topPlace = data[0];
        var lat = topPlace.lat, lng = topPlace.lng;
        var result = findNearestSpot(lat, lng);

        data.slice(0, 5).forEach(function(place, idx) {
          // 회색 마커: 검색 결과 자체 위치 (참고용)
          var marker = mapCreateMarker(place.lat, place.lng, {
            onClick: function() {
              var d = getDistanceKm(place.lat, place.lng, result.spot.lat, result.spot.lng);
              var body = '<p>주소: ' + place.address + '</p>';
              if (d <= DISTANCE_THRESHOLD_KM) {
                body += '<p style="margin-top:8px;">가장 가까운 스팟: <b>' + result.spot.name + '</b> (' + d.toFixed(1) + 'km)</p>' +
                        '<button id="viewNearestBtn" style="margin-top:8px;padding:8px 14px;border-radius:8px;border:none;background:#e11d48;color:white;cursor:pointer;">이 스팟 보기</button>';
              } else {
                body += '<p style="color:#c2410c;font-size:13px;margin-top:8px;">⚠️ 반경 ' + DISTANCE_THRESHOLD_KM + 'km 내에 등록된 스팟이 없습니다. (가장 가까운 곳: ' + result.spot.name + ', ' + d.toFixed(1) + 'km — 참고용으로만 보세요)</p>';
              }
              openModal(place.name, body);
              var viewBtn = document.getElementById('viewNearestBtn');
              if (viewBtn) {
                viewBtn.addEventListener('click', function() { openSpotModal(result.spot); });
              }
            }
          });
          markers.push(marker);
        });

        mapFitBounds(data.slice(0, 5).map(function(p) { return { lat: p.lat, lng: p.lng }; }));
        var topDist = getDistanceKm(lat, lng, result.spot.lat, result.spot.lng);
        if (topDist <= DISTANCE_THRESHOLD_KM) {
          showStatus('"' + keyword + '" 근처 ' + topDist.toFixed(1) + 'km 지점에 라이브 스팟이 있습니다!');
        } else {
          showStatus('"' + keyword + '" 근처엔 등록된 라이브 스팟이 없습니다 (가장 가까운 곳 ' + topDist.toFixed(1) + 'km)');
        }
      } else if (res.zeroResult) {
        showStatus('검색 결과가 없습니다.');
      } else {
        showStatus('검색 중 오류가 발생했습니다.');
      }
    });
  }

  document.getElementById('searchBtn').addEventListener('click', searchPlace);
  document.getElementById('searchInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') searchPlace();
  });

  // 5. 라이브/기록 등록 기능
  var placingMode = false;
  var pendingLatLng = null;
  var myLocationMarker = null;

  function enterPlacingMode() {
    placingMode = true;
    document.getElementById('placingBanner').classList.add('show');
  }
  function exitPlacingMode() {
    placingMode = false;
    document.getElementById('placingBanner').classList.remove('show');
  }

  // URL을 보고 유튜브인지 인스타그램인지 자동 감지
  function extractContentInfo(url) {
    var yt = url.match(/(?:youtube\.com\/(?:watch\?v=|live\/|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    if (yt) return { type: 'youtube', videoId: yt[1] };

    var ig = url.match(/instagram\.com\/(?:reel|p|tv)\/([a-zA-Z0-9_-]+)/);
    if (ig) return { type: 'instagram', permalink: url.split('?')[0] };

    return null;
  }

  document.getElementById('registerBtn').addEventListener('click', function() {
    if (placingMode) { exitPlacingMode(); return; } // 토글: 이미 등록모드면 끄기
    enterPlacingMode();
    showStatus('📍 지도를 클릭해서 보여주고 싶은 위치를 지정해주세요');
  });

  document.getElementById('myJourneysBtn').addEventListener('click', function() {
    var groups = getMyJourneyGroups();
    if (groups.length === 0) {
      openModal('🧭 내 기록 목록', '<p style="color:#888;">아직 만든 기록 여정이 없습니다. 등록할 때 "기록 이름"을 입력하면 여기 모입니다.</p>');
      return;
    }
    var body = '<div style="display:flex;flex-direction:column;gap:8px;">' +
      groups.map(function(g, idx) {
        return '<button class="myJourneyBtn" data-idx="' + idx + '" style="text-align:left;padding:10px 12px;border-radius:8px;border:1px solid #eee;background:#f9f9f9;cursor:pointer;font-size:14px;">🧭 ' + g.name + ' <span style="color:#999;font-size:12px;">(' + g.spots.length + '곳)</span></button>';
      }).join('') + '</div>';
    openModal('🧭 내 기록 목록', body);
    document.querySelectorAll('.myJourneyBtn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var g = groups[parseInt(btn.getAttribute('data-idx'), 10)];
        openJourneyModal(g.name, g.spots);
      });

  // 최근 현장(공익 제보) 목록 — 최신 등록순, 등록시각 강조 표시 (대관령 사례형 공익 제보 지원)
  // 등록량이 늘어날수록 오래된 제보까지 계속 섞여 나와 "최근"이라는 의미가 흐려지는 문제가 있어,
  // 일정 시간(RECENT_REPORTS_HOURS) 이내 등록된 것만 표시. 데이터가 느는 속도를 미리 예측하기
  // 어려워 코드에 고정하지 않고 Firestore(config/settings)에 저장해 관리자가 직접 조정 가능하게 함
  var RECENT_REPORTS_HOURS = 48; // Firestore에 설정값이 없을 때 쓰는 기본값
  // CCTV 연동 전체 공개 여부 - 관리자가 config/settings.cctvEnabled로 조정 (ID 69)
  // 검증 전까지는 기본값 false로 두어 일반 사용자에게는 노출하지 않음
  var CCTV_ENABLED = false;
  db.collection('config').doc('settings').get().then(function(doc) {
    if (doc.exists && typeof doc.data().recentReportsHours === 'number') {
      RECENT_REPORTS_HOURS = doc.data().recentReportsHours;
    }
    if (doc.exists && typeof doc.data().cctvEnabled === 'boolean') {
      CCTV_ENABLED = doc.data().cctvEnabled;
    }
    updateCctvButtonVisibility();
  }).catch(function(err) { console.error('설정 로드 실패:', err); });

  // ================================================================
  // CCTV 연동 (ID 69) - 관리자 온/오프 스위치 + 지도 표시
  // ================================================================
  var cctvMarkers = [];
  var cctvVisible = false;

  // 공개설정(CCTV_ENABLED)이 꺼져 있어도 관리자는 사전 검증을 위해 버튼을 계속 볼 수 있음
  function updateCctvButtonVisibility() {
    var toggleBtn = document.getElementById('cctvToggleBtn');
    var adminBtn = document.getElementById('cctvAdminBtn');
    if (toggleBtn) toggleBtn.style.display = (CCTV_ENABLED || isAdmin) ? 'block' : 'none';
    if (adminBtn) adminBtn.style.display = isAdmin ? 'block' : 'none';
  }

  function clearCctvMarkers() {
    cctvMarkers.forEach(mapRemoveMarker);
    cctvMarkers = [];
  }

  function loadCctvMarkers() {
    showStatus('📹 주변 CCTV 불러오는 중...');
    fetchCctvList(mapGetBounds(), function(result) {
      if (!result.ok) {
        showStatus('⚠️ CCTV 정보를 불러오지 못했습니다. (' + (result.error && result.error.message ? result.error.message : '네트워크/CORS 오류로 추정') + ')');
        return;
      }
      clearCctvMarkers();
      result.list.forEach(function(item) {
        var lat = parseFloat(item.coordy); // 출력변수 문서 기준 coordy=위도
        var lng = parseFloat(item.coordx); // 출력변수 문서 기준 coordx=경도
        if (isNaN(lat) || isNaN(lng)) return;
        var name = item.cctvname || 'CCTV';
        var streamUrl = item.cctvurl || '';
        cctvMarkers.push(mapCreateMarker(lat, lng, {
          color: 'purple',
          onClick: function() {
            if (!streamUrl) {
              openModal('☔ ' + name, '<p style="color:#888;font-size:13px;">영상 주소를 받아오지 못했습니다.</p>');
              return;
            }
            // 새 창을 여는 대신, 정보창(모달) 안에 사각 영상 박스로 바로 재생합니다.
            // - 예전 방식(새 창 열기)은 팝업이 잠깐 보이다 브라우저가 원본 스트림 주소로
            //   전체화면 전환해버려 화면 일부만 영상, 나머지는 검은 여백으로 보이는 문제가
            //   있었습니다. 우리 페이지 안에서 직접 재생하면 이 문제가 없습니다.
            var body = '<p style="margin:0 0 8px;font-weight:600;">☔ 이곳 날씨도 확인</p>' +
              '<p style="margin:0 0 10px;color:#888;font-size:12.5px;">' + name + '</p>' +
              '<video id="cctvVideoPlayer" controls autoplay muted playsinline ' +
              'style="width:100%;max-width:480px;border-radius:8px;background:#000;display:block;"></video>' +
              '<p id="cctvVideoFallback" style="display:none;margin-top:10px;font-size:12.5px;color:#c0392b;">' +
              '영상을 바로 재생하지 못했습니다. <a href="' + streamUrl + '" target="_blank" style="color:#7c3aed;">새 창에서 열어보기</a></p>';
            openModal('☔ ' + name, body);

            var video = document.getElementById('cctvVideoPlayer');
            var fallback = document.getElementById('cctvVideoFallback');
            function showFallback() { if (fallback) fallback.style.display = 'block'; }

            if (window.Hls && Hls.isSupported()) {
              var hls = new Hls();
              currentCctvHls = hls;
              hls.on(Hls.Events.ERROR, function(evt, data) {
                if (data && data.fatal) showFallback();
              });
              hls.loadSource(streamUrl);
              hls.attachMedia(video);
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
              // 사파리는 HLS를 <video> 태그가 자체 지원 - hls.js 없이 바로 재생
              video.src = streamUrl;
            } else {
              showFallback();
            }
            // 영상이 자연스럽게 끝나면(무한 라이브가 아니라 짧게 반복되는 영상일 경우)
            // 정보창도 같이 닫히도록 함
            video.addEventListener('ended', function() {
              document.getElementById('closeBtn').click();
            });
            video.addEventListener('error', showFallback);
          }
        }));
      });
      showStatus('📹 CCTV ' + result.list.length + '개 표시됨');
    });
  }

  document.getElementById('cctvToggleBtn').addEventListener('click', function() {
    cctvVisible = !cctvVisible;
    var btn = document.getElementById('cctvToggleBtn');
    if (cctvVisible) {
      btn.textContent = '📹 CCTV 끄기';
      loadCctvMarkers();
    } else {
      btn.textContent = '📹 CCTV';
      clearCctvMarkers();
    }
  });

  // 지도를 축소/이동해도 CCTV가 처음 켰을 때 보이던 지역에만 그대로 남아있던 문제 수정:
  // CCTV 레이어가 켜져 있는 동안은 지도 이동/확대·축소가 멈출 때마다 현재 보이는 범위로
  // 다시 불러옵니다(30분 캐시가 있어서 같은 지역을 반복 조회해도 실제 호출은 새 지역에
  // 대해서만 나갑니다).
  mapOnIdle(function() {
    if (cctvVisible) loadCctvMarkers();
  });

  // 관리자 전용: 전체 사용자에게 CCTV 기능을 공개할지(cctvEnabled) 조정
  function renderCctvAdminModal() {
    var body = '<p style="margin-bottom:14px;">현재 전체 사용자에게 CCTV 기능이 ' +
      (CCTV_ENABLED ? '<b style="color:#0a7d2c;">켜져</b>' : '<b style="color:#c0392b;">꺼져</b>') + ' 있습니다.</p>' +
      '<button id="cctvEnableToggleBtn" style="padding:10px 16px;border-radius:8px;border:none;background:' +
      (CCTV_ENABLED ? '#c0392b' : '#0a7d2c') + ';color:white;cursor:pointer;">' +
      (CCTV_ENABLED ? '전체 사용자 대상 끄기' : '전체 사용자 대상 켜기') + '</button>' +
      '<p style="margin-top:12px;font-size:12px;color:#888;">관리자 화면에는 이 설정과 무관하게 항상 CCTV 버튼이 보입니다(사전 검증용).</p>';
    openModal('⚙️ CCTV 공개 설정', body);
    var t = document.getElementById('cctvEnableToggleBtn');
    if (t) t.addEventListener('click', function() {
      var newVal = !CCTV_ENABLED;
      db.collection('config').doc('settings').set({ cctvEnabled: newVal }, { merge: true }).then(function() {
        CCTV_ENABLED = newVal;
        showStatus('✅ CCTV 공개 설정이 ' + (newVal ? 'ON' : 'OFF') + '으로 저장되었습니다.');
        renderCctvAdminModal();
      }).catch(function(err) { alert('저장 실패: ' + err.message); });
    });
  }
  document.getElementById('cctvAdminBtn').addEventListener('click', renderCctvAdminModal);

  function renderRecentReports() {
    var cutoff = Date.now() - RECENT_REPORTS_HOURS * 3600 * 1000;
    var sceneSpots = sharedSpots.filter(function(s) {
      return s.category === 'scene' && s.createdAt && s.createdAt >= cutoff;
    }).sort(function(a, b) { return (b.createdAt || 0) - (a.createdAt || 0); });

    // 관리자에게만 보이는 기준 조정 안내 - 일반 사용자는 조정 여부를 알 필요가 없어 숨김
    var adminControl = isAdmin
      ? '<div style="margin-bottom:10px;padding:8px 10px;background:#eef2ff;border-radius:8px;font-size:12px;color:#4338ca;display:flex;justify-content:space-between;align-items:center;gap:8px;">' +
        '<span>표시 기준: 최근 ' + RECENT_REPORTS_HOURS + '시간 이내</span>' +
        '<button id="recentReportsThresholdBtn" style="flex:0 0 auto;border:none;background:#4338ca;color:white;padding:5px 10px;border-radius:6px;font-size:11.5px;cursor:pointer;">기준 변경</button></div>'
      : '';

    if (sceneSpots.length === 0) {
      openModal('🚨 최근 현장 제보', adminControl + '<p style="color:#888;">최근 ' + RECENT_REPORTS_HOURS + '시간 이내 등록된 현장 제보가 없습니다.</p>');
    } else {
      var body = adminControl + '<div style="display:flex;flex-direction:column;gap:8px;">' +
        sceneSpots.map(function(s, idx) {
          var ago = s.createdAt ? timeAgoLabel(s.createdAt) : '';
          return '<button class="recentReportBtn" data-idx="' + idx + '" style="text-align:left;padding:10px 12px;border-radius:8px;border:1px solid #fecaca;background:#fff7f7;cursor:pointer;font-size:14px;">🚨 ' + s.name +
            (ago ? '<br><span style="font-size:11px;color:#c2410c;">' + ago + ' 등록</span>' : '') + '</button>';
        }).join('') + '</div>';
      openModal('🚨 최근 현장 제보 (' + sceneSpots.length + '건)', body);
      document.querySelectorAll('.recentReportBtn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          openSpotModal(sceneSpots[parseInt(btn.getAttribute('data-idx'), 10)]);
        });
      });
    }

    var thresholdBtn = document.getElementById('recentReportsThresholdBtn');
    if (thresholdBtn) {
      thresholdBtn.addEventListener('click', function() {
        var val = prompt('현장 제보를 "최근"으로 표시할 기준 시간을 입력하세요 (시간 단위, 현재: ' + RECENT_REPORTS_HOURS + '시간)', RECENT_REPORTS_HOURS);
        if (val === null) return;
        var n = parseInt(val, 10);
        if (isNaN(n) || n <= 0) { alert('1 이상의 숫자를 입력해주세요.'); return; }
        RECENT_REPORTS_HOURS = n;
        db.collection('config').doc('settings').set({ recentReportsHours: n }, { merge: true }).then(function() {
          showStatus('✅ 최근 제보 기준이 ' + n + '시간으로 저장되었습니다.');
          renderRecentReports();
        }).catch(function(err) {
          alert('저장 실패: ' + err.message);
        });
      });
    }
  }
  document.getElementById('recentReportsBtn').addEventListener('click', renderRecentReports);

  // 등록모드일 때는 지도를 몇 번을 클릭(줌 조정 후 재클릭 포함)해도 항상 등록창이 뜸
  mapOnClick(function(pos) {
    if (!placingMode) return;
    pendingLatLng = pos; // {lat, lng}
    openRegisterForm();
  });

  // 현위치 버튼: 평소엔 지도만 이동, 등록모드 중이면 그 자리로 바로 등록창까지 오픈
  document.getElementById('locateBtn').addEventListener('click', function() {
    if (!navigator.geolocation) {
      showStatus('이 브라우저는 위치 확인을 지원하지 않습니다.');
      return;
    }
    showStatus('📡 위치 확인 중...');
    navigator.geolocation.getCurrentPosition(function(pos) {
      var here = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      mapSetCenter(here.lat, here.lng);
      mapSetLevel(3);

      mapRemoveMarker(myLocationMarker);
      myLocationMarker = mapCreateLocationMarker(here.lat, here.lng);

      if (placingMode) {
        pendingLatLng = here;
        openRegisterForm();
      } else {
        showStatus('현재 위치로 이동했습니다.');
      }
    }, function() {
      showStatus('⚠️ 위치 확인 실패 — 위치 권한을 확인해주세요.');
    });
  });

  var selectedCategory = null;

  function openRegisterForm() {
    selectedCategory = null;
    var catButtonsHtml = CATEGORY_OPTIONS.map(function(c) {
      return '<button type="button" class="catBtn" data-key="' + c.key + '" style="padding:8px 12px;border-radius:8px;border:1px solid #ddd;background:#f9f9f9;cursor:pointer;font-size:13px;">' + c.emoji + ' ' + c.label + '</button>';
    }).join('');

    var formHtml =
      '<div class="formRow"><label>장소 이름</label><input id="regTitle" type="text" placeholder="예: 우리집 앞마당, OO캠핑장"></div>' +
      '<div class="formRow"><label>어떤 콘텐츠인가요?</label><div id="catButtons" style="display:flex;gap:6px;flex-wrap:wrap;">' + catButtonsHtml + '</div></div>' +
      '<div class="formRow"><label>링크 (유튜브 라이브 또는 인스타그램 릴스/게시물)</label><input id="regUrl" type="text" placeholder="https://youtube.com/watch?v=... 또는 https://instagram.com/reel/..."></div>' +
      '<p id="quickReportHint" style="display:none;font-size:12px;color:#c2410c;margin:-4px 0 12px;">🚨 현장 제보는 장소 이름과 링크만 입력하면 바로 등록돼요. 등록 즉시 "🚨 최근 제보" 목록 맨 위에 최신순으로 노출됩니다.</p>' +
      '<div class="formRow" id="journeyFormRow"><label><span id="journeyLabelMain">기록 이름</span> <span id="journeyLabelHint" style="color:#999;font-weight:normal;">(선택 — 여러 곳을 하나로 묶고 싶을 때)</span></label>' +
      '<input id="regJourney" type="text" list="journeyList" placeholder="예: 26년7월 지리산여행">' +
      '<datalist id="journeyList">' + getMyJourneyGroups().map(function(g) { return '<option value="' + g.name + '"></option>'; }).join('') + '</datalist>' +
      '</div>' +
      '<p id="placeHint"></p>' +
      '<button id="confirmRegisterBtn">등록하기</button>' +
      '<p style="font-size:12px;color:#999;margin-top:10px;">🔴 유튜브 라이브 = 빨간 핀(지금 이 순간) · 🔵 인스타그램 = 파란 핀(그때 그 순간의 기록)<br>등록하시면 모든 방문자에게 공유됩니다.</p>' +
      '<p style="text-align:center;margin-top:10px;"><a href="#" id="cancelRegisterLink" style="color:#999;font-size:13px;">등록 모드 완전히 종료하기</a></p>';
    openModal('새 스팟 등록', formHtml);

    document.querySelectorAll('.catBtn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        selectedCategory = btn.getAttribute('data-key');
        document.querySelectorAll('.catBtn').forEach(function(b) {
          b.style.background = '#f9f9f9'; b.style.borderColor = '#ddd'; b.style.color = '#000';
        });
        btn.style.background = '#111827'; btn.style.borderColor = '#111827'; btn.style.color = '#fff';

        // 현장(공익 제보) 선택 시: 짧은 제보 동선 — 기록 이름 입력란을 숨기고 빠른 등록 안내만 표시
        var journeyRow = document.getElementById('journeyFormRow');
        var quickHint = document.getElementById('quickReportHint');
        if (selectedCategory === 'scene') {
          if (journeyRow) journeyRow.style.display = 'none';
          if (quickHint) quickHint.style.display = 'block';
        } else {
          if (journeyRow) journeyRow.style.display = '';
          if (quickHint) quickHint.style.display = 'none';

          // 카테고리별로 "묶음 이름" 입력란의 라벨·설명·예시를 다르게 표시
          var cfg = JOURNEY_FIELD_CONFIG[selectedCategory] || JOURNEY_FIELD_DEFAULT;
          var labelMain = document.getElementById('journeyLabelMain');
          var labelHint = document.getElementById('journeyLabelHint');
          var journeyInput = document.getElementById('regJourney');
          if (labelMain) labelMain.textContent = cfg.label;
          if (labelHint) labelHint.textContent = cfg.hint;
          if (journeyInput) journeyInput.placeholder = cfg.placeholder;
        }
      });
    });

    document.getElementById('cancelRegisterLink').addEventListener('click', function(e) {
      e.preventDefault();
      exitPlacingMode();
      document.getElementById('modal').classList.remove('show');
      document.getElementById('modalBody').innerHTML = '';
    });

    document.getElementById('confirmRegisterBtn').addEventListener('click', function() {
      var title = document.getElementById('regTitle').value.trim();
      var url = document.getElementById('regUrl').value.trim();
      var info = extractContentInfo(url);

      if (!title) { document.getElementById('placeHint').textContent = '장소 이름을 입력해주세요.'; return; }
      if (!selectedCategory) { document.getElementById('placeHint').textContent = '어떤 콘텐츠인지 선택해주세요.'; return; }
      if (!info) { document.getElementById('placeHint').textContent = '유튜브(watch/live) 또는 인스타그램(reel/p) 링크만 지원합니다. 링크를 다시 확인해주세요.'; return; }

      var newSpot = { name: title, lat: pendingLatLng.lat, lng: pendingLatLng.lng, type: info.type, ownerId: myOwnerId, category: selectedCategory };
      var journeyInput = document.getElementById('regJourney').value.trim();
      if (journeyInput) newSpot.journey = journeyInput;
      newSpot.createdAt = firebase.firestore.FieldValue.serverTimestamp();
      if (info.type === 'youtube') newSpot.videoId = info.videoId;
      else newSpot.permalink = info.permalink;

      var confirmBtn = document.getElementById('confirmRegisterBtn');
      confirmBtn.disabled = true;
      confirmBtn.textContent = '등록 중...';

      db.collection('spots').add(newSpot).then(function() {
        exitPlacingMode(); // 등록 성공시에만 등록모드 종료
        document.getElementById('modal').classList.remove('show');
        document.getElementById('modalBody').innerHTML = '';
        showStatus('✅ "' + title + '" 등록 완료! 지도에서 확인해보세요 (모두에게 공유됩니다)');
      }).catch(function(err) {
        document.getElementById('placeHint').textContent = '등록 실패: ' + err.message;
        confirmBtn.disabled = false;
        confirmBtn.textContent = '등록하기';
      });
    });
  }

  // 4. 모달
  // CCTV 영상(hls.js)이 재생 중일 때 모달이 다른 내용으로 바뀌거나 닫히면 재생을 확실히
  // 멈추기 위한 핸들 - 안 멈추면 화면엔 안 보여도 백그라운드에서 계속 스트림을 받습니다.
  var currentCctvHls = null;
  function stopCctvPlayback() {
    if (currentCctvHls) { currentCctvHls.destroy(); currentCctvHls = null; }
  }

  function openModal(title, bodyHtml) {
    stopCctvPlayback();
    var content = document.getElementById('modalContent');
    // 새 정보창을 열 때마다 기본 위치(상단 중앙)로 되돌립니다. (이전에 드래그해 옮겨둔 위치는 초기화)
    content.style.left = '';
    content.style.top = '';
    content.style.transform = '';
    document.getElementById('modal').classList.remove('peek');
    document.getElementById('restoreModalBtn').style.display = 'none';
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalBody').innerHTML = bodyHtml;
    document.getElementById('modal').classList.add('show');
  }
  document.getElementById('minimizeBtn').addEventListener('click', function() {
    document.getElementById('modal').classList.add('peek');
    document.getElementById('restoreModalBtn').style.display = 'block';
  });
  document.getElementById('restoreModalBtn').addEventListener('click', function() {
    document.getElementById('modal').classList.remove('peek');
    document.getElementById('restoreModalBtn').style.display = 'none';
  });
  document.getElementById('closeBtn').addEventListener('click', function() {
    stopCctvPlayback();
    document.getElementById('modal').classList.remove('show');
    document.getElementById('modalBody').innerHTML = '';
    document.getElementById('restoreModalBtn').style.display = 'none';
    clearJourneyPolyline();
  });

  // 정보창 드래그 이동 기능 (접어두기 외 추가 기능)
  // 헤더(⠿ 아이콘·제목 영역)를 마우스/터치로 잡고 끌면 정보창을 화면 어디로든 옮길 수 있습니다.
  // 지도(경로)와 정보창(일정 목록)을 동시에 보고 싶을 때, 정보창을 경로가 가려지지 않는 자리로 옮겨두면 됩니다.
  (function enableModalDrag() {
    var content = document.getElementById('modalContent');
    var handle = document.getElementById('modalHeader');
    var dragging = false, offsetX = 0, offsetY = 0;

    function startDrag(clientX, clientY) {
      var rect = content.getBoundingClientRect();
      dragging = true;
      offsetX = clientX - rect.left;
      offsetY = clientY - rect.top;
      content.style.transform = 'none';
      content.style.left = rect.left + 'px';
      content.style.top = rect.top + 'px';
      content.classList.add('dragging');
    }
    function moveDrag(clientX, clientY) {
      if (!dragging) return;
      var w = content.offsetWidth, h = content.offsetHeight;
      var maxX = Math.max(0, window.innerWidth - w);
      var maxY = Math.max(0, window.innerHeight - h);
      var x = Math.min(Math.max(0, clientX - offsetX), maxX);
      var y = Math.min(Math.max(0, clientY - offsetY), maxY);
      content.style.left = x + 'px';
      content.style.top = y + 'px';
    }
    function endDrag() {
      dragging = false;
      content.classList.remove('dragging');
    }

    handle.addEventListener('mousedown', function(e) {
      if (e.target.closest('button')) return; // 버튼(닫기·접어두기) 클릭은 드래그로 처리하지 않음
      startDrag(e.clientX, e.clientY);
      e.preventDefault();
    });
    document.addEventListener('mousemove', function(e) {
      if (!dragging) return;
      moveDrag(e.clientX, e.clientY);
      e.preventDefault();
    });
    document.addEventListener('mouseup', endDrag);

    handle.addEventListener('touchstart', function(e) {
      if (e.target.closest('button')) return;
      var t = e.touches[0];
      startDrag(t.clientX, t.clientY);
    }, { passive: true });
    document.addEventListener('touchmove', function(e) {
      if (!dragging) return;
      var t = e.touches[0];
      moveDrag(t.clientX, t.clientY);
    }, { passive: true });
    document.addEventListener('touchend', endDrag);
    document.addEventListener('touchcancel', endDrag);
  })();
</script>
